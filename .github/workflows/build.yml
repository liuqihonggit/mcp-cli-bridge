name: Build and Test

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
  workflow_call:
    outputs:
      artifact-name:
        description: 'Build artifact name'
        value: 'mcp-cli-bridge-build'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Clean NuGet packages and publish directory
        run: |
          Write-Host "[Clean] Removing nuget/ directory..." -ForegroundColor Cyan
          if (Test-Path "nuget") { Remove-Item -Path "nuget" -Recurse -Force }
          
          Write-Host "[Clean] Removing publish/ directory..." -ForegroundColor Cyan
          if (Test-Path "publish") { Remove-Item -Path "publish" -Recurse -Force }
          
          Write-Host "[Clean] Completed" -ForegroundColor Green

      - name: Restore and build local NuGet packages (lib/)
        run: |
          Write-Host "[Prepare] Creating empty nuget/ directory for local source..." -ForegroundColor Cyan
          New-Item -ItemType Directory -Path "nuget" -Force | Out-Null

          Write-Host "[Restore] Restoring lib/ projects..." -ForegroundColor Cyan
          Get-ChildItem -Path "lib" -Recurse -Filter "*.csproj" -File | ForEach-Object {
            $name = $_.BaseName
            if ($name -like "*.Tests") { return }
            Write-Host "  Restoring $name..." -ForegroundColor Gray
            dotnet restore $_.FullName --configfile nuget.config
          }

          Write-Host "`n[Build] Building lib/ projects..." -ForegroundColor Cyan
          Get-ChildItem -Path "lib" -Recurse -Filter "*.csproj" -File | ForEach-Object {
            $name = $_.BaseName
            if ($name -like "*.Tests") { return }
            Write-Host "  Building $name..." -ForegroundColor Gray
            dotnet build $_.FullName -c Release --no-restore
          }

          Write-Host "`n[Lib] All lib/ projects built successfully!" -ForegroundColor Green

      - name: AOT Build
        run: .\buildAndNpm.ps1

      - name: Unit Tests
        run: dotnet test McpHost.slnx -c Release --verbosity normal

      - name: E2E Tests
        run: dotnet run --project tests\E2E\MyMemoryServer.E2E.csproj -c Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-cli-bridge-build
          path: publish/
          retention-days: 7
