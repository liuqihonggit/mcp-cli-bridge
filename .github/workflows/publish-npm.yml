name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  publish:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mcp-cli-bridge-build
          path: .

      - name: Inject version from tag
        run: |
          $tag = "${{ github.ref_name }}"
          $tagVersion = $tag -replace '^v', ''
          
          Write-Host "Tag version: $tagVersion"
          
          $packageJsonPath = "publish\package.json"
          $content = Get-Content $packageJsonPath -Raw
          $content = $content -replace '"version":\s*"[^"]*"', "`"version`": `"$tagVersion`""
          Set-Content $packageJsonPath $content -NoNewline
          
          $package = Get-Content $packageJsonPath | ConvertFrom-Json
          Write-Host "Package version after injection: $($package.version)" -ForegroundColor Green

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: ./publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/McpHost.exe
            publish/Plugins/MemoryCli/MemoryCli.exe
            publish/Plugins/FileReaderCli/FileReaderCli.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Notify success
        if: success()
        run: |
          Write-Host "✅ Publish successful! Version ${{ github.ref_name }} has been published to npm."
          Write-Host "📦 Package: @jingjingbox/mcp-cli-bridge"
          Write-Host "🏷️  Version: ${{ github.ref_name }}"

      - name: Notify failure
        if: failure()
        run: |
          Write-Host "❌ Publish failed!"
          Write-Host "🔍 Please check the logs above for details."
          Write-Host "🔗 Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
