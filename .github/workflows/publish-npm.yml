name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  publish:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mcp-cli-bridge-build
          path: .

      - name: Validate version match
        run: |
          $tag = "${{ github.ref_name }}"
          $tagVersion = $tag -replace '^v', ''
          $package = Get-Content "package.json" | ConvertFrom-Json
          $packageVersion = $package.version
          
          Write-Host "Tag version: $tagVersion"
          Write-Host "Package version: $packageVersion"
          
          if ($tagVersion -ne $packageVersion) {
            Write-Error "Version mismatch! Tag is '$tagVersion' but package.json is '$packageVersion'"
            Write-Error "Please update package.json version to match the tag before pushing."
            exit 1
          }
          
          Write-Host "Version match confirmed: $tagVersion" -ForegroundColor Green

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: ./publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/McpHost.exe
            publish/Plugins/MemoryCli/MemoryCli.exe
            publish/Plugins/FileReaderCli/FileReaderCli.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Notify success
        if: success()
        run: |
          Write-Host "✅ Publish successful! Version ${{ github.ref_name }} has been published to npm."
          Write-Host "📦 Package: @jingjingbox/mcp-cli-bridge"
          Write-Host "🏷️  Version: ${{ github.ref_name }}"

      - name: Notify failure
        if: failure()
        run: |
          Write-Host "❌ Publish failed!"
          Write-Host "🔍 Please check the logs above for details."
          Write-Host "🔗 Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
